<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旧暦カレンダー 2026年3月</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'Times New Roman', serif;
      background: #f7f2e9;
      min-height: 100vh;
      padding: 30px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 24px;
    }

    header h1 {
      font-size: 2rem;
      color: #3b1f0a;
      letter-spacing: 0.1em;
    }

    header .nengo {
      font-size: 0.95rem;
      color: #7a5030;
      margin-top: 4px;
      letter-spacing: 0.2em;
    }

    .calendar {
      max-width: 840px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 32px rgba(80, 40, 0, 0.12);
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: #5c2d0a;
    }

    .weekday {
      text-align: center;
      padding: 12px 4px;
      color: #f5deb8;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
    }

    .weekday.sun { color: #ffaaaa; }
    .weekday.sat { color: #aaccff; }

    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background: #e0d4c0;
    }

    .day {
      background: #fff;
      padding: 8px 8px 6px;
      min-height: 110px;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .day.empty {
      background: #faf8f4;
    }

    .day-num {
      font-size: 1.5rem;
      font-weight: bold;
      color: #222;
      line-height: 1;
    }

    .day.is-sunday .day-num  { color: #bb0000; }
    .day.is-saturday .day-num { color: #004eb8; }
    .day.is-holiday .day-num  { color: #bb0000; }

    .day.is-today {
      background: #fffde8;
    }

    .day.is-today::after {
      content: '今日';
      position: absolute;
      top: 6px;
      right: 6px;
      font-size: 0.6rem;
      background: #e07000;
      color: white;
      padding: 1px 4px;
      border-radius: 3px;
    }

    .moon {
      position: absolute;
      top: 7px;
      right: 8px;
      font-size: 1.1rem;
      line-height: 1;
    }

    .day.is-today .moon {
      right: 36px;
    }

    .lunar {
      font-size: 0.72rem;
      color: #888;
      font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
    }

    .lunar.new-month {
      color: #0044bb;
      font-weight: bold;
    }

    .holiday-name {
      font-size: 0.65rem;
      color: #bb0000;
      font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
    }

    .sekki {
      font-size: 0.65rem;
      color: #228833;
      font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
    }

    .rokuyou {
      font-size: 0.68rem;
      margin-top: auto;
      padding: 2px 5px;
      border-radius: 3px;
      display: inline-block;
      font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
      width: fit-content;
    }

    .rokuyou.taian     { background: #fff0f0; color: #cc0000; font-weight: bold; }
    .rokuyou.butsumetsu{ background: #eef0ff; color: #2244aa; }
    .rokuyou.sensho    { background: #f0fff4; color: #1a7a33; }
    .rokuyou.tomobiki  { background: #fffbf0; color: #9a6000; }
    .rokuyou.senbu     { background: #f8f0ff; color: #6622aa; }
    .rokuyou.shakku    { background: #fff0f8; color: #aa1166; }

    .legend {
      max-width: 840px;
      margin: 20px auto 0;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 0.8rem;
      font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
      color: #555;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .legend-item span.badge {
      padding: 2px 6px;
      border-radius: 3px;
    }
  </style>
</head>
<body>

<header>
  <h1>2026年（令和8年）3月</h1>
  <div class="nengo">丙午年（ひのえうま）　旧暦 正月・如月</div>
</header>

<div class="calendar">
  <div class="weekdays">
    <div class="weekday sun">日</div>
    <div class="weekday">月</div>
    <div class="weekday">火</div>
    <div class="weekday">水</div>
    <div class="weekday">木</div>
    <div class="weekday">金</div>
    <div class="weekday sat">土</div>
  </div>
  <div class="days" id="days"></div>
</div>

<div class="legend">
  <div class="legend-item"><span class="badge rokuyou taian">大安</span>最も吉</div>
  <div class="legend-item"><span class="badge rokuyou tomobiki">友引</span>友を引く</div>
  <div class="legend-item"><span class="badge rokuyou sensho">先勝</span>午前吉</div>
  <div class="legend-item"><span class="badge rokuyou senbu">先負</span>午後吉</div>
  <div class="legend-item"><span class="badge rokuyou shakku">赤口</span>凶日</div>
  <div class="legend-item"><span class="badge rokuyou butsumetsu">仏滅</span>最も凶</div>
  <div class="legend-item">🌑新月&nbsp; 🌓上弦&nbsp; 🌕満月&nbsp; 🌗下弦</div>
</div>

<script>
  // ─── 旧暦データ（2026年3月） ────────────────────────────
  // 旧暦1月1日 = 2026/2/17（新月）  → 旧暦1月は29日間
  // 旧暦2月1日 = 2026/3/18（新月）
  // 2026/3/1  = 旧暦1月13日
  // 2026/3/17 = 旧暦1月29日
  // 2026/3/18 = 旧暦2月1日
  // 2026/3/31 = 旧暦2月14日

  function getLunar(day) {
    if (day <= 17) {
      return { month: 1, day: 12 + day };   // 3/1→1/13 … 3/17→1/29
    } else {
      return { month: 2, day: day - 17 };   // 3/18→2/1 … 3/31→2/14
    }
  }

  // ─── 六曜 ────────────────────────────────────────────────
  // (旧暦月 + 旧暦日) % 6
  // 0=大安, 1=赤口, 2=先勝, 3=友引, 4=先負, 5=仏滅
  const ROKUYOU      = ['大安','赤口','先勝','友引','先負','仏滅'];
  const ROKUYOU_CLS  = ['taian','shakku','sensho','tomobiki','senbu','butsumetsu'];

  function getRokuyou(lm, ld) {
    const i = (lm + ld) % 6;
    return { name: ROKUYOU[i], cls: ROKUYOU_CLS[i] };
  }

  // ─── 月の満ち欠け ────────────────────────────────────────
  // 旧暦1月15日(3/3)=満月, 1月7-8日(2/23-24)=上弦
  // 旧暦1月22日(3/10)=下弦, 旧暦2月1日(3/18)=新月
  // 旧暦2月7-8日(3/24-25)=上弦
  const MOON = {
    3: '🌕',   // 満月（旧暦1月15日）
    10: '🌗',  // 下弦（旧暦1月22日）
    18: '🌑',  // 新月（旧暦2月1日）
    25: '🌓',  // 上弦（旧暦2月8日）
  };

  // ─── 祝日・節気 ─────────────────────────────────────────
  const HOLIDAYS = { 20: '春分の日' };
  const SEKKI    = { 6: '啓蟄', 20: '春分' };

  // ─── 今日 ───────────────────────────────────────────────
  const todayDay = new Date().getDate();

  // ─── 描画 ────────────────────────────────────────────────
  // 2026/3/1 = 日曜（startDow=0）
  const START_DOW = 0;
  const container = document.getElementById('days');

  // 空セル
  for (let i = 0; i < START_DOW; i++) {
    container.insertAdjacentHTML('beforeend', '<div class="day empty"></div>');
  }

  for (let day = 1; day <= 31; day++) {
    const dow     = (START_DOW + day - 1) % 7;  // 0=日 6=土
    const lunar   = getLunar(day);
    const ry      = getRokuyou(lunar.month, lunar.day);
    const moon    = MOON[day] || '';
    const holiday = HOLIDAYS[day] || '';
    const sekki   = SEKKI[day] || '';

    const cls = [
      'day',
      dow === 0 || holiday ? 'is-sunday' : '',
      dow === 6            ? 'is-saturday' : '',
      holiday              ? 'is-holiday'  : '',
      day === todayDay     ? 'is-today'    : '',
    ].filter(Boolean).join(' ');

    const lunarLabel = lunar.day === 1
      ? `<div class="lunar new-month">旧暦 ${lunar.month}月${lunar.day}日</div>`
      : `<div class="lunar">旧暦${lunar.month}月${lunar.day}日</div>`;

    container.insertAdjacentHTML('beforeend', `
      <div class="${cls}">
        ${moon ? `<div class="moon">${moon}</div>` : ''}
        <div class="day-num">${day}</div>
        ${lunarLabel}
        ${holiday ? `<div class="holiday-name">${holiday}</div>` : ''}
        ${sekki   ? `<div class="sekki">🌿 ${sekki}</div>`       : ''}
        <div class="rokuyou ${ry.cls}">${ry.name}</div>
      </div>
    `);
  }
</script>
</body>
</html>
